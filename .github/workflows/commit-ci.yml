name: Commit

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libibus-1.0-dev libnotify-dev libgtk-3-dev libsecret-1-dev librime-dev \
            git

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Configure build
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr ..

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          VERSION=$(git describe --always)
          PKG_DIR=/tmp/qiwo-ibus-${VERSION}
          STAGE_DIR=/tmp/qiwo-ibus-stage-${VERSION}

          rm -rf "${PKG_DIR}" "${STAGE_DIR}"
          DESTDIR="${STAGE_DIR}" cmake --install build
          mkdir -p "${PKG_DIR}"
          cp -a "${STAGE_DIR}/usr" "${PKG_DIR}/usr"

          cat > ${PKG_DIR}/install.sh << 'INSTALL_EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          PREFIX="${PREFIX:-/usr}"
          echo "==> 安装 Qiwo Input Method for Linux ..."

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          sudo mkdir -p "${PREFIX}"
          sudo cp -a "${SCRIPT_DIR}/usr/." "${PREFIX}/"
          if command -v ldconfig >/dev/null 2>&1; then
            sudo ldconfig || true
          fi

          echo "==> 重启 IBus ..."
          ibus-daemon -drx 2>/dev/null || true

          echo "==> 安装完成！请在 IBus 设置中添加「齐我输入法」"
          INSTALL_EOF
          chmod +x ${PKG_DIR}/install.sh

          test -x "${PKG_DIR}/usr/libexec/qiwo/ibus-engine-rime"
          test -x "${PKG_DIR}/usr/bin/qiwo-webdav-settings"
          test -x "${PKG_DIR}/usr/share/qiwo/qiwo-rime-sync"
          test -f "${PKG_DIR}/usr/libexec/qiwo/libqiwo_input_format.so"
          test -f "${PKG_DIR}/usr/share/ibus/component/qiwo.xml"

          cd /tmp
          tar -czf qiwo-ibus-${VERSION}.tar.gz qiwo-ibus-${VERSION}/
          echo "Package: /tmp/qiwo-ibus-${VERSION}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Qiwo-Linux-${{ github.sha }}
          path: /tmp/qiwo-ibus-*.tar.gz
          retention-days: 90
