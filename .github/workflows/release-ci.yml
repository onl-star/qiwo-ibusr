name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Checkout qiwo-sync-core
        uses: actions/checkout@v6
        with:
          repository: LeaWron/qiwo-sync-core
          path: qiwo-sync-core

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libibus-1.0-dev libnotify-dev librime-dev \
            git

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build qiwo-sync-core
        run: cargo build --manifest-path qiwo-sync-core/Cargo.toml --release -p qiwo-rime-sync

      - name: Configure build
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr ..

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          VERSION=$(git describe --always)
          PKG_DIR=/tmp/qiwo-ibus-${VERSION}

          mkdir -p ${PKG_DIR}/bin
          mkdir -p ${PKG_DIR}/icons

          cp build/ibus-engine-rime ${PKG_DIR}/bin/
          cp build/qiwo.xml ${PKG_DIR}/
          cp -r icons/* ${PKG_DIR}/icons/ 2>/dev/null || true
          cp qiwo-sync-core/target/release/qiwo-rime-sync ${PKG_DIR}/bin/

          cat > ${PKG_DIR}/install.sh << 'INSTALL_EOF'
          #!/usr/bin/env bash
          set -e

          PREFIX="${PREFIX:-/usr}"
          echo "==> 安装 Qiwo Input Method for Linux ..."

          sudo mkdir -p "${PREFIX}/libexec/qiwo"
          sudo mkdir -p "${PREFIX}/share/ibus/component"
          sudo mkdir -p "${PREFIX}/share/qiwo/icons"
          sudo mkdir -p "${PREFIX}/bin"

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          sudo cp "${SCRIPT_DIR}/bin/ibus-engine-rime" "${PREFIX}/libexec/qiwo/"
          sudo cp "${SCRIPT_DIR}/qiwo.xml" "${PREFIX}/share/ibus/component/"
          sudo cp -r "${SCRIPT_DIR}/icons/"* "${PREFIX}/share/qiwo/icons/" 2>/dev/null || true
          sudo cp "${SCRIPT_DIR}/bin/qiwo-rime-sync" "${PREFIX}/bin/"

          echo "==> 重启 IBus ..."
          ibus-daemon -drx 2>/dev/null || true

          echo "==> 安装完成！请在 IBus 设置中添加「齐我输入法」"
          INSTALL_EOF
          chmod +x ${PKG_DIR}/install.sh

          cd /tmp
          tar -czf qiwo-ibus-${VERSION}.tar.gz qiwo-ibus-${VERSION}/

          echo "tarball=/tmp/qiwo-ibus-${VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: "/tmp/qiwo-ibus-*.tar.gz"
          draft: true
