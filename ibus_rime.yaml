# Qiwo ibus-rime configuration

config_version: '1.0'

# WebDAV sync configuration.
# Linux uses the shared qiwo-rime-sync command from qiwo-sync-core.
# Open "WebDAV 设置" from the IBus panel, or run:
#   qiwo-webdav-settings
#
# Saved graphical settings live in:
#   ~/.config/qiwo/webdav.conf
#
# Graphical settings use a WebDAV server URL plus a remote path.
# The remote path defaults to:
#   qiwo-rime-sync
#
# Environment variables override saved graphical settings. QIWO_WEBDAV_URL is
# the complete remote directory URL passed to the sync command:
#   export QIWO_WEBDAV_URL="https://dav.example.com/qiwo-rime-sync"
#   export QIWO_WEBDAV_USERNAME="username"
#   export QIWO_WEBDAV_PASSWORD="password"
#   export QIWO_DEVICE_ID="linux-main"
#   export QIWO_AUTO_SYNC_INTERVAL_MINUTES="30"
#
# Auto-sync user dictionary. If QIWO_AUTO_SYNC_INTERVAL_MINUTES is set,
# it overrides this value; otherwise this value overrides the saved
# graphical setting.
#   sync:
#     auto_sync_interval_minutes: 60   # 0 = disabled, minimum 1 minute

style:
  # candidate list orientation (false|true).
  horizontal: true

  # embed preedit text in the input field (false|true).
  inline_preedit: true

  # `preedit_style` specifies what to display as inline preedit text.
  # display inline the input under conversion.
  #preedit_style: composition
  # preview the converted text.
  preedit_style: preview

  # `cursor_type` specifies where the inline cursor is located.
  # inline cursor is at the insertion point.
  #cursor_type: insert
  # inline cursor is at the beginning of text under conversion.
  cursor_type: select

  # built-in color schemes for highlighting the portion of inline preedit text
  # that needs focus. (null|aqua|azure|ink|luna)
  # by default highlighting color is not used.
  color_scheme: ~
  # color_scheme: aqua
